<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | SR Studio</title>
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#090b13">
    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem('sr-theme');
                var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
                var theme = storedTheme || (prefersLight ? 'light' : 'dark');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (error) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="fontawesome/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="legal-page">
    <a class="skip-link" href="#main-content">跳过导航，直接查看内容</a>
    <header class="site-header" data-header>
        <div class="container nav-bar">
            <a class="brand" href="index.html#home" aria-label="返回首页">
                <img src="images/logo.png" alt="SR思锐 团队图标" class="brand-logo" loading="lazy" decoding="async" width="48" height="48">
                <span class="brand-name">SR思锐 团队</span>
            </a>
            <div class="nav-shell">
                <nav id="primary-nav" class="nav-links" aria-label="主导航">
                    <ul>
                        <li><a href="index.html#home">首页</a></li>
                        <li><a href="privacy.html">隐私政策</a></li>
                        <li><a href="service.html">使用条款</a></li>
                    </ul>
                </nav>
                <div class="nav-actions">
                    <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换到浅色模式" title="切换主题">
                        <i class="fas fa-sun theme-toggle__icon" aria-hidden="true"></i>
                        <span class="theme-toggle__text">浅色</span>
                    </button>
                    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" data-nav-toggle>
                        <span class="sr-only">切换导航菜单</span>
                        <i class="fas fa-bars" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <main id="main-content" class="legal-main legal-container" aria-labelledby="not-found-title">
        <h1 id="not-found-title">404 - 页面未找到</h1>
        <p class="legal-meta">抱歉，您访问的页面不存在或已被移动。</p>
        <p>您可以返回 <a href="index.html">首页</a>，或检查地址是否正确。</p>
    </main>
    <script src="script.js"></script>
</body>
</html>
